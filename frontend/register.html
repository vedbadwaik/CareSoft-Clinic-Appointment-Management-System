{% extends "base.html" %}

{% block title %}Register - CareSoft Clinic{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Create Account</h2>
    <p class="card-subtitle">Register to begin scheduling appointments with our doctors.</p>

    <form id="register-form">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>

        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="john.doe@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary" id="btn-submit">Register</button>
    </form>

    <div class="card-footer">
        Already have an account? <a href="/login-page">Log In</a>
    </div>
</div>

<script>
    document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const btnSubmit = document.getElementById("btn-submit");
        btnSubmit.disabled = true;
        btnSubmit.textContent = "Registering...";

        const formData = new FormData(e.target);
        
        try {
            const response = await fetch("/register", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            
            if (response.ok && data.message === "User Registered Successfully") {
                showToast("Registration successful! Redirecting to login...", "success");
                setTimeout(() => {
                    window.location.href = "/login-page";
                }, 1500);
            } else {
                showToast(data.message || "Registration failed. Please try again.", "error");
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Register";
            }
        } catch (error) {
            console.error("Error:", error);
            showToast("An unexpected error occurred. Please check your connection.", "error");
            btnSubmit.disabled = false;
            btnSubmit.textContent = "Register";
        }
    });

    // Guard route: if user is already logged in, redirect them
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("token")) {
            window.location.href = "/dashboard-page";
        }
    });
</script>
{% endblock %}
