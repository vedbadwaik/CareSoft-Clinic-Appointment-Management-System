{% extends "base.html" %}

{% block title %}Log In - CareSoft Clinic{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Welcome Back</h2>
    <p class="card-subtitle">Log in to manage and schedule your medical appointments.</p>

    <form id="login-form">
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="your.name@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary" id="btn-submit">Log In</button>
    </form>

    <div class="card-footer">
        Don't have an account yet? <a href="/register-page">Register</a>
    </div>
</div>

<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const btnSubmit = document.getElementById("btn-submit");
        btnSubmit.disabled = true;
        btnSubmit.textContent = "Logging in...";

        const formData = new FormData(e.target);
        
        try {
            const response = await fetch("/login", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            
            if (response.ok && data.access_token) {
                // Save tokens and patient info locally
                localStorage.setItem("token", data.access_token);
                localStorage.setItem("userName", data.name);
                localStorage.setItem("userEmail", data.email);
                localStorage.setItem("userRole", data.role);
                
                showToast(`Welcome back, ${data.name}! Redirecting...`, "success");
                
                setTimeout(() => {
                    window.location.href = "/dashboard-page";
                }, 1000);
            } else {
                showToast(data.message || "Invalid Email or Password", "error");
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Log In";
            }
        } catch (error) {
            console.error("Error:", error);
            showToast("An unexpected error occurred. Please check your connection.", "error");
            btnSubmit.disabled = false;
            btnSubmit.textContent = "Log In";
        }
    });

    // Guard route: if user is already logged in, redirect them
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("token")) {
            window.location.href = "/dashboard-page";
        }
    });
</script>
{% endblock %}
