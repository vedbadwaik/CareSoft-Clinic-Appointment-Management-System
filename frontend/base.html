<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CareSoft Clinic{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f766e;
            --primary-hover: #0d9488;
            --primary-light: #ccfbf1;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(226, 232, 240, 0.8);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 16px -1px rgba(15, 118, 110, 0.05), 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 20px 25px -5px rgba(15, 118, 110, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(240, 253, 250, 1) 0%, rgba(224, 242, 254, 0.7) 45%, rgba(248, 250, 252, 1) 90%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.65rem;
            letter-spacing: -0.025em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.925rem;
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-md);
            transition: all 0.25s ease;
        }

        .nav-links a:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-links a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.25);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.1);
            color: var(--error);
            font-family: inherit;
            font-size: 0.925rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-md);
            transition: all 0.25s ease;
        }

        .btn-logout:hover {
            background: var(--error);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
            border-color: var(--error);
        }

        /* Generic CSS components (form cards) */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .card-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.35rem;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.7);
            outline: none;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .form-control:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.15);
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 0.8rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
            margin-top: 1.75rem;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(15, 118, 110, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .card-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        /* Hide elements dynamically */
        .hidden {
            display: none !important;
        }

        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Toast notifications styling */
        #toast-container {
            position: fixed;
            top: 5.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 380px;
            width: 100%;
        }

        .toast {
            background: white;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow-lg);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        .toast.warning {
            border-left-color: var(--warning);
        }

        .toast-message {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                transform: translateY(-12px);
                opacity: 0;
            }
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(15, 118, 110, 0.05);
            background: rgba(255, 255, 255, 0.3);
            margin-top: auto;
            font-weight: 500;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="/" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                    <path d="M12 9v6M9 12h6"/>
                </svg>
                <span>CareSoft Clinic</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" id="nav-home">Home</a></li>
                <li class="auth-only hidden"><a href="/dashboard-page" id="nav-dashboard">Dashboard</a></li>
                <li class="auth-only hidden patient-only"><a href="/book-page" id="nav-book">Book Appointment</a></li>
                <li class="guest-only"><a href="/login-page" id="nav-login">Login</a></li>
                <li class="guest-only"><a href="/register-page" id="nav-register">Register</a></li>
                <li class="auth-only hidden"><button class="btn-logout" onclick="logout()">Logout</button></li>
            </ul>
        </nav>
    </header>

    <div id="toast-container"></div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; 2026 CareSoft Clinic. All rights reserved. Crafted for premium health & wellness.
    </footer>

    <script>
        // API Fetch wrapper to automatically inject Authorization token and handle 401s
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem("token");
            if (token) {
                if (!options.headers) {
                    options.headers = {};
                }
                // Only set Content-Type to application/json if the body is NOT FormData
                if (!(options.body instanceof FormData) && !options.headers["Content-Type"]) {
                    options.headers["Content-Type"] = "application/json";
                }
                options.headers["Authorization"] = `Bearer ${token}`;
            }
            
            const response = await fetch(url, options);
            if (response.status === 401) {
                // If backend tells us token is expired, clean up session
                localStorage.removeItem("token");
                localStorage.removeItem("userName");
                localStorage.removeItem("userEmail");
                localStorage.removeItem("userRole");
                
                // Clear cookie by requesting logout endpoint
                await fetch("/logout", { method: "POST" });
                
                showToast("Session expired. Please log in again.", "error");
                setTimeout(() => {
                    window.location.href = "/login-page";
                }, 1500);
            }
            return response;
        }

        // Global Authentication Control
        function updateNavigation() {
            const token = localStorage.getItem("token");
            const role = localStorage.getItem("userRole");
            
            const authOnly = document.querySelectorAll(".auth-only");
            const guestOnly = document.querySelectorAll(".guest-only");
            const patientOnly = document.querySelectorAll(".patient-only");

            if (token) {
                authOnly.forEach(el => el.classList.remove("hidden"));
                guestOnly.forEach(el => el.classList.add("hidden"));
                
                if (role === "patient") {
                    patientOnly.forEach(el => el.classList.remove("hidden"));
                } else {
                    patientOnly.forEach(el => el.classList.add("hidden"));
                }
            } else {
                authOnly.forEach(el => el.classList.add("hidden"));
                guestOnly.forEach(el => el.classList.remove("hidden"));
                patientOnly.forEach(el => el.classList.add("hidden"));
            }
        }

        // Highlight active link
        function highlightActiveLink() {
            const path = window.location.pathname;
            const links = {
                "/": "nav-home",
                "/dashboard-page": "nav-dashboard",
                "/book-page": "nav-book",
                "/login-page": "nav-login",
                "/register-page": "nav-register"
            };
            const activeId = links[path];
            if (activeId) {
                const activeEl = document.getElementById(activeId);
                if (activeEl) activeEl.classList.add("active");
            }
        }

        // Logout function
        async function logout() {
            try {
                await fetch("/logout", { method: "POST" });
            } catch (e) {
                console.error("Cookie logout failed", e);
            }
            localStorage.removeItem("token");
            localStorage.removeItem("userEmail");
            localStorage.removeItem("userName");
            localStorage.removeItem("userRole");
            showToast("Successfully logged out!", "success");
            setTimeout(() => {
                window.location.href = "/";
            }, 1000);
        }

        // Toast notifications function
        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            
            toast.innerHTML = `
                <span class="toast-message">${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;

            container.appendChild(toast);

            // Auto-remove toast after 4 seconds
            setTimeout(() => {
                toast.style.animation = "fadeOut 0.3s ease forwards";
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Initial setup
        document.addEventListener("DOMContentLoaded", () => {
            updateNavigation();
            highlightActiveLink();
        });
    </script>
</body>
</html>
